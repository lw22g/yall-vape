<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Resource Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 650px;
            padding: 50px 40px;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 160px;
            margin: 0;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -6px;
            line-height: 1;
        }
        h2 {
            font-size: 26px;
            margin: 20px 0 15px;
            font-weight: 600;
            color: #e2e8f0;
            letter-spacing: 0.5px;
        }
        p {
            font-size: 16px;
            color: #94a3b8;
            margin: 0;
            line-height: 1.8;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Resource Not Found</h2>
        <p>We apologize, but the requested resource could not be located on this server. It may have been removed, renamed, or is temporarily unavailable. Please verify the URL and try again.</p>
    </div>
</body>
</html>
